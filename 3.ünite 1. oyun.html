<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kökten Kurtuluş - Sonsuz Matematik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap");

      body {
        font-family: "Roboto", sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
        overflow: hidden;
        height: 100vh;
      }

      .bg-grid {
        background-image: radial-gradient(#1e293b 1px, transparent 1px);
        background-size: 30px 30px;
      }

      .number-card {
        transition: all 0.2s ease;
        cursor: pointer;
        user-select: none;
      }

      .number-card:hover {
        transform: scale(1.1);
        filter: brightness(1.2);
      }

      .number-card.selected-a {
        background-color: #3b82f6 !important;
        border-color: #93c5fd !important;
        box-shadow: 0 0 15px #3b82f6;
      }

      .number-card.selected-b {
        background-color: #ef4444 !important;
        border-color: #fca5a5 !important;
        box-shadow: 0 0 15px #ef4444;
      }

      .slot {
        min-width: 90px;
        min-height: 90px;
        border: 3px dashed #334155;
        transition: all 0.3s ease;
      }

      .slot.filled {
        border-style: solid;
        background-color: #1e293b;
      }

      .glow-text {
        text-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
      }

      @keyframes success-pulse {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.1);
          opacity: 0.8;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      .success-anim {
        animation: success-pulse 0.5s ease-in-out;
      }
    </style>
  </head>
  <body class="bg-grid flex flex-col items-center justify-center p-4">
    <!-- Başlık Paneli -->
    <div class="mb-8 text-center">
      <h1
        class="text-4xl font-bold text-blue-500 tracking-tighter font-['Orbitron'] glow-text"
      >
        KÖKTEN KURTULUŞ
      </h1>
      <div class="flex items-center justify-center gap-4 mt-2">
        <span
          class="px-3 py-1 bg-slate-800 rounded-full text-xs font-bold text-blue-400 border border-blue-900"
          >SORU: <span id="levelText">1</span></span
        >
        <span
          class="px-3 py-1 bg-slate-800 rounded-full text-xs font-bold text-yellow-500 border border-yellow-900"
          >SKOR: <span id="scoreText">0</span></span
        >
      </div>
    </div>

    <!-- Hedef Sayı Göstergesi -->
    <div
      id="targetBox"
      class="w-full max-w-md bg-slate-900/80 border-2 border-blue-500/30 p-10 rounded-3xl mb-8 flex flex-col items-center justify-center shadow-2xl backdrop-blur-md"
    >
      <span class="text-gray-500 text-xs uppercase tracking-[0.3em] mb-2"
        >Hedef İfade</span
      >
      <div
        id="targetDisplay"
        class="text-6xl font-bold text-white font-['Orbitron'] tracking-tighter"
      >
        √??
      </div>
    </div>

    <!-- Seçim Alanı -->
    <div
      class="w-full max-w-2xl bg-slate-800/50 p-8 rounded-3xl border border-slate-700 shadow-xl"
    >
      <!-- Yuvalar (a ve b) -->
      <div class="flex items-center justify-center gap-8 mb-10">
        <div class="text-center">
          <span class="text-[10px] uppercase text-gray-500 mb-3 block font-bold"
            >Kök Dışı (a)</span
          >
          <div
            id="slotA"
            class="slot flex items-center justify-center rounded-2xl text-4xl font-bold text-blue-400"
          >
            ?
          </div>
        </div>

        <div class="text-5xl font-light text-slate-600 mt-6">√</div>

        <div class="text-center">
          <span class="text-[10px] uppercase text-gray-500 mb-3 block font-bold"
            >Kök İçi (b)</span
          >
          <div
            id="slotB"
            class="slot flex items-center justify-center rounded-2xl text-4xl font-bold text-red-400"
          >
            ?
          </div>
        </div>
      </div>

      <!-- Sayı Havuzu -->
      <div>
        <p
          class="text-center text-[10px] text-slate-500 uppercase tracking-widest mb-4"
        >
          Sayı Havuzundan Seçim Yap
        </p>
        <div id="numberPool" class="flex flex-wrap justify-center gap-4">
          <!-- Sayılar Dinamik Gelecek -->
        </div>
      </div>

      <div class="mt-8 flex justify-center">
        <button
          onclick="resetSelection(true)"
          class="text-xs text-slate-500 hover:text-white border border-slate-700 px-4 py-2 rounded-full transition-all"
        >
          Seçimi Sıfırla 🔇
        </button>
      </div>
    </div>

    <!-- Hızlı Geri Bildirim -->
    <div
      id="toast"
      class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 scale-0 opacity-0 transition-all duration-300 pointer-events-none z-50"
    >
      <div
        id="toastContent"
        class="bg-blue-600 text-white text-3xl font-bold font-['Orbitron'] px-12 py-6 rounded-2xl shadow-2xl border-4 border-blue-400"
      >
        DOĞRU!
      </div>
    </div>

    <script>
      // Ses Sentezleyici
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      function playSound(type) {
        try {
          if (audioCtx.state === "suspended") audioCtx.resume();
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          const now = audioCtx.currentTime;

          if (type === "select") {
            osc.type = "sine";
            osc.frequency.setValueAtTime(600, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.start();
            osc.stop(now + 0.1);
          } else if (type === "success") {
            osc.type = "triangle";
            osc.frequency.setValueAtTime(440, now);
            osc.frequency.exponentialRampToValueAtTime(880, now + 0.2);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start();
            osc.stop(now + 0.3);
          } else if (type === "error") {
            osc.type = "sawtooth";
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.linearRampToValueAtTime(100, now + 0.3);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start();
            osc.stop(now + 0.3);
          } else if (type === "reset") {
            osc.type = "sine";
            osc.frequency.setValueAtTime(200, now);
            gain.gain.setValueAtTime(0.05, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.start();
            osc.stop(now + 0.1);
          }
        } catch (e) {
          console.log("Audio error");
        }
      }

      let score = 0;
      let questionCount = 0;
      let selectedA = null;
      let selectedB = null;
      let currentLevel = null;
      let usedTargets = new Set(); // Daha önce sorulmuş sayıları tutmak için küme

      function isSquareFree(n) {
        if (n < 2) return true;
        for (let i = 2; i * i <= n; i++) {
          if (n % (i * i) === 0) return false;
        }
        return true;
      }

      function generateRandomLevel() {
        let a, b, target;
        let levelAttempts = 0;

        // Benzersiz bir soru bulana kadar dene
        while (levelAttempts < 100) {
          levelAttempts++;

          // Dinamik zorluk ayarı: Soru sayısı arttıkça menzil genişler
          const maxA = Math.min(15, 4 + Math.floor(questionCount / 3));
          const maxB = Math.min(20, 3 + Math.floor(questionCount / 5));

          a = Math.floor(Math.random() * (maxA - 2 + 1)) + 2;
          let bAttempts = 0;
          do {
            b = Math.floor(Math.random() * (maxB - 2 + 1)) + 2;
            bAttempts++;
            if (bAttempts > 50) {
              b = 2;
              break;
            }
          } while (!isSquareFree(b));

          target = a * a * b;

          // Eğer bu sayı daha önce sorulmadıysa döngüden çık
          if (!usedTargets.has(target)) {
            usedTargets.add(target);
            break;
          }
        }

        // Güvenlik: Eğer 100 denemede benzersiz bulamazsak listeyi temizle (çok nadir bir durum)
        if (levelAttempts >= 100) {
          usedTargets.clear();
          usedTargets.add(target);
        }

        // Sayı Havuzu Mantığı
        let pool = new Set();
        pool.add(a);
        pool.add(b);

        // Çeldiricileri ekle
        if (a * a < 200) pool.add(a * a);
        if (a * b < 200) pool.add(a * b);
        if (a + b < 200) pool.add(a + b);

        // Havuzu 6 benzersiz sayıya tamamla
        let poolGuard = 0;
        while (pool.size < 6 && poolGuard < 100) {
          poolGuard++;
          let randomNum =
            Math.floor(Math.random() * Math.max(30, a * 2, b * 2)) + 2;
          if (randomNum !== a && randomNum !== b) {
            pool.add(randomNum);
          }
        }

        const shuffledPool = Array.from(pool).sort(() => Math.random() - 0.5);

        return {
          target: target,
          display: "√" + target,
          a: a,
          b: b,
          pool: shuffledPool,
        };
      }

      function initLevel() {
        questionCount++;
        currentLevel = generateRandomLevel();

        document.getElementById("targetDisplay").innerText =
          currentLevel.display;
        document.getElementById("levelText").innerText = questionCount;
        document.getElementById("scoreText").innerText = score;

        const poolContainer = document.getElementById("numberPool");
        poolContainer.innerHTML = "";

        currentLevel.pool.forEach((num) => {
          const card = document.createElement("div");
          card.className =
            "number-card w-16 h-16 bg-slate-800 rounded-2xl flex items-center justify-center text-2xl font-bold border-2 border-slate-700 shadow-lg";
          card.innerText = num;
          card.onclick = () => selectNumber(num, card);
          poolContainer.appendChild(card);
        });

        resetSelection(false);
      }

      function selectNumber(num, element) {
        if (selectedA !== null && selectedB !== null) return;
        playSound("select");

        if (selectedA === null) {
          selectedA = num;
          element.classList.add("selected-a");
          updateSlots();
        } else if (selectedB === null) {
          selectedB = num;
          element.classList.add("selected-b");
          updateSlots();
          setTimeout(checkAnswer, 300);
        }
      }

      function updateSlots() {
        const slotA = document.getElementById("slotA");
        const slotB = document.getElementById("slotB");

        slotA.innerText = selectedA !== null ? selectedA : "?";
        selectedA !== null
          ? slotA.classList.add("filled", "border-blue-500")
          : slotA.classList.remove("filled", "border-blue-500");

        slotB.innerText = selectedB !== null ? selectedB : "?";
        selectedB !== null
          ? slotB.classList.add("filled", "border-red-500")
          : slotB.classList.remove("filled", "border-red-500");
      }

      function resetSelection(withSound = true) {
        if (withSound) playSound("reset");
        selectedA = null;
        selectedB = null;
        document.querySelectorAll(".number-card").forEach((c) => {
          c.classList.remove("selected-a", "selected-b");
        });
        updateSlots();
      }

      function showFeedback(msg, isSuccess = true) {
        const toast = document.getElementById("toast");
        const content = document.getElementById("toastContent");

        content.innerText = msg;
        content.className = isSuccess
          ? "bg-green-600 text-white text-2xl md:text-3xl font-bold font-['Orbitron'] px-8 md:px-12 py-4 md:py-6 rounded-2xl shadow-2xl border-4 border-green-400 text-center"
          : "bg-red-600 text-white text-2xl md:text-3xl font-bold font-['Orbitron'] px-8 md:px-12 py-4 md:py-6 rounded-2xl shadow-2xl border-4 border-red-400 text-center";

        toast.classList.remove("scale-0", "opacity-0");
        toast.classList.add("scale-100", "opacity-100");

        if (isSuccess) {
          playSound("success");
          document.getElementById("targetBox").classList.add("success-anim");
        } else {
          playSound("error");
        }

        setTimeout(() => {
          toast.classList.add("scale-0", "opacity-0");
          toast.classList.remove("scale-100", "opacity-100");
          document.getElementById("targetBox").classList.remove("success-anim");
        }, 800);
      }

      function checkAnswer() {
        const calculation = selectedA * selectedA * selectedB;
        let isSimplest = isSquareFree(selectedB);

        if (calculation === currentLevel.target) {
          if (isSimplest) {
            score += 10;
            showFeedback("DOĞRU!");
            setTimeout(initLevel, 1000);
          } else {
            showFeedback("EN SADE HALİ DEĞİL!", false);
            setTimeout(resetSelection, 1000);
          }
        } else {
          showFeedback("HATALI!", false);
          setTimeout(resetSelection, 1000);
        }
      }

      window.onload = initLevel;
    </script>
  </body>
</html>
